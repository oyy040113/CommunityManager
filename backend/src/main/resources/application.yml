server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: community-manager
  
  # 数据库配置
  datasource:
    # 开发环境使用H2内存数据库
    url: jdbc:h2:mem:communitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
    # 生产环境使用MySQL (取消注释并配置)
    # url: jdbc:mysql://localhost:3306/community_manager?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: your_password
  
  # H2控制台 (仅开发环境)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC
        # 生产环境使用MySQL方言
        # dialect: org.hibernate.dialect.MySQL8Dialect
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
  
  # Jackson 配置
  jackson:
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSXXX
    serialization:
      write-dates-as-timestamps: false

# JWT配置
jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026CommunityManager
  expiration: 86400000 # 24小时
  refresh-expiration: 604800000 # 7天

# 文件存储配置
file:
  upload-dir: ./uploads
  allowed-types: jpg,jpeg,png,gif,pdf,doc,docx

# 日志配置
logging:
  level:
    root: INFO
    com.community: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
